name: AZD Template Validation
on: 
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  template_validation:
    runs-on: ubuntu-latest
    name: azd template validation
    steps:
      - uses: actions/checkout@v4

      - name: Fix bicepparam decorators
        run: |
          # Remove all decorator lines from bicepparam files (decorators not allowed in .bicepparam syntax)
          find submodules/ai-landing-zone/bicep -name "*.bicepparam" -type f | while read file; do
            echo "Processing: $file"
            grep -v '^@' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
            echo "Fixed decorators in: $file"
          done
        shell: bash

      - name: Verify Bicep compilation
        run: |
          echo "Testing Bicep compilation..."
          az bicep build --file submodules/ai-landing-zone/bicep/infra/main.bicep || echo "WARNING: Bicep compilation failed"
        shell: bash

      - uses: microsoft/template-validation-action@Latest
        timeout-minutes: 30
        with:
          validateAzd: ${{ vars.TEMPLATE_VALIDATE_AZD }}
          useDevContainer: ${{ vars.TEMPLATE_USE_DEV_CONTAINER }}
        id: validation
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          fabricCapacityMode: 'none'
      - name: print result
        run: cat ${{ steps.validation.outputs.resultFile }}
