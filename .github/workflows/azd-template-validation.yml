name: AZD Template Validation
on: 
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  template_validation:
    runs-on: ubuntu-latest
    name: azd template validation
    steps:
      - uses: actions/checkout@v4

      # The postprovision cleanup step (Stage 19) references a script in the ai-landing-zone submodule
      # that deletes the deploy/ folder generated during preprovision. Since the template validation
      # action runs azd provision in a temporary workspace, this cleanup would break the validation.
      - name: Remove postprovision cleanup step from azure.yaml
        run: |
          yq -i 'del(.hooks.postprovision[] | select(.run == "./submodules/ai-landing-zone/bicep/scripts/postprovision.ps1"))' azure.yaml

      - uses: microsoft/template-validation-action@Latest
        with:
          validateAzd: ${{ vars.TEMPLATE_VALIDATE_AZD }}
          useDevContainer: ${{ vars.TEMPLATE_USE_DEV_CONTAINER }}
        id: validation
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          fabricCapacityMode: 'none'
      - name: print result
        run: cat ${{ steps.validation.outputs.resultFile }}
