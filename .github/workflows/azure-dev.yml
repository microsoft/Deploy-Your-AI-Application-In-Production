name: AZD Deployment
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - 'azure.yaml'
      - 'scripts/**'
      - '.github/workflows/azure-dev.yml'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_PRINCIPAL_ID: ${{ vars.PRINCIPAL_ID || vars.AZURE_CLIENT_ID }}
      AZURE_PRINCIPAL_TYPE: 'ServicePrincipal'
      TEMP: /tmp
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install azd
        uses: Azure/setup-azd@v2
      - name: Azure Developer CLI Login
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID" 
        shell: pwsh
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Service Principal Object ID
        run: |
          # Use explicit PRINCIPAL_ID if set, otherwise resolve Object ID from Client ID
          if [ -n "${{ vars.PRINCIPAL_ID }}" ]; then
            echo "Using explicitly configured PRINCIPAL_ID"
            echo "AZURE_PRINCIPAL_ID=${{ vars.PRINCIPAL_ID }}" >> $GITHUB_ENV
          else
            echo "Resolving Service Principal Object ID from Client ID..."
            OBJECT_ID=$(az ad sp show --id "$AZURE_CLIENT_ID" --query id -o tsv)
            if [ -n "$OBJECT_ID" ]; then
              echo "Resolved Object ID: $OBJECT_ID"
              echo "AZURE_PRINCIPAL_ID=$OBJECT_ID" >> $GITHUB_ENV
            else
              echo "::error::Could not resolve Service Principal Object ID from Client ID"
              exit 1
            fi
          fi

      - name: Create Resource Group if needed
        run: |
          # Use provided RG name or derive from environment name
          RESOURCE_GROUP="${AZURE_RESOURCE_GROUP:-rg-${AZURE_ENV_NAME}}"
          echo "Using resource group: $RESOURCE_GROUP"
          
          RG_EXISTS=$(az group exists --name "$RESOURCE_GROUP")
          if [ "$RG_EXISTS" = "false" ]; then
            echo "Creating resource group: $RESOURCE_GROUP"
            az group create --name "$RESOURCE_GROUP" --location ${{ vars.AZURE_LOCATION }}
          else
            echo "Resource group already exists: $RESOURCE_GROUP"
          fi
          
          # Set for subsequent steps
          echo "RESOURCE_GROUP=$RESOURCE_GROUP" >> $GITHUB_ENV

      - name: Provision Infrastructure
        id: provision-main
        continue-on-error: true
        run: azd provision --no-prompt
        env:
           AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}
           AZURE_PRINCIPAL_TYPE: 'ServicePrincipal'
           fabricCapacityMode: 'none'
           fabricWorkspaceMode: 'none'
